<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cozy Foodie" />
  <link rel="manifest" href="manifest.json?v=4" />
  <link rel="apple-touch-icon" href="icon-192.png?v=4" />
  <link rel="stylesheet" href="styles-v4.css?v=4" />
  <title>Cozy Foodie</title>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="eyebrow">уютный рандомайзер еды</div>
      <h1>Cozy Foodie</h1>
      <p>Нажми кнопку — и приложение решит, что готовить. Без экзистенциального кризиса у холодильника.</p>
      <div class="hero-actions">
        <button id="randomBtn" class="primary-btn">🎲 Случайный рецепт</button>
        <button id="surpriseBtn" class="ghost-btn">✨ Мне лень думать</button>
      </div>
    </section>

    <section class="tools">
      <input id="searchInput" class="search" type="search" placeholder="Поиск: паста, курица, завтрак..." />
      <div id="filters" class="filters"></div>
    </section>

    <section class="pantry-card">
      <div>
        <h2>Что есть дома?</h2>
        <p>Впиши продукты через запятую — покажу, что можно приготовить.</p>
      </div>
      <textarea id="pantryInput" placeholder="например: яйца, сыр, бекон, паста"></textarea>
      <button id="pantryBtn" class="secondary-btn">🔎 Найти рецепты</button>
      <div id="pantryResult" class="pantry-result"></div>
    </section>

    <section class="add-card">
      <details>
        <summary>➕ Добавить свой рецепт</summary>
        <form id="addRecipeForm" class="add-form">
          <input name="title" placeholder="Название" required />
          <input name="categories" placeholder="Категории через запятую: ужин, быстро" />
          <input name="image" placeholder="Ссылка на картинку" />
          <div class="form-grid">
            <input name="time" placeholder="Время: 20 мин" />
            <input name="heat" placeholder="Огонь: 5 из 9" />
            <input name="portions" placeholder="Порции: 2" />
            <input name="difficulty" placeholder="Сложность" />
          </div>
          <textarea name="ingredients" placeholder="Ингредиенты, каждый с новой строки"></textarea>
          <textarea name="steps" placeholder="Шаги, каждый с новой строки"></textarea>
          <button class="primary-btn" type="submit">Сохранить рецепт</button>
        </form>
      </details>
    </section>

    <section id="recipesGrid" class="recipes-grid"></section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <button id="closeModal" class="close-btn">×</button>
    <article id="modalContent" class="modal-content"></article>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app-v4.js?v=4"></script>
</body>
</html>
